app = "job-portal-api"
primary_region = "iad"

[build]
dockerfile = "backend/Dockerfile"
context = "."

[env]
APP_ENV = "production"
APP_DEBUG = "false"
APP_TIMEZONE = "UTC"

[http_service]
processes = ["app"]
protocol = "tcp"
port = 8000

[[services]]
protocol = "tcp"
internal_port = 8000
processes = ["app"]
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[processes]
app = "php artisan serve --host 0.0.0.0 --port 8000"

# Database
[[services]]
protocol = "tcp"
internal_port = 5432

[[services.ports]]
port = 5432

# Health check
[[services]]
processes = ["app"]
protocol = "http"
internal_port = 8000
auto_stop_machines = true
auto_start_machines = true

[[services.http_checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/health"
protocol = "http"
timeout = "5s"
tls_skip_verify = false
